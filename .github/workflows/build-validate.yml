# Build and validate the spec using bikeshed
#
# TODO: publish to github pages on release
#
# based on https://w3c.github.io/spec-prod/#examples

name: CI
on:
  push:
    branches:
      - development
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  main:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: w3c/spec-prod@v2
        with:
          TOOLCHAIN: bikeshed
